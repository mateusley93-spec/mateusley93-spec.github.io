<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Padaria Delícia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-amber-50 min-h-screen text-gray-800">

    <header class="bg-amber-600 text-white shadow-md p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                🥐 Padaria Delícia - Sistema de Gestão
            </h1>
            <span class="bg-amber-700 px-3 py-1 rounded-full text-sm font-semibold">Painel Interno</span>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-amber-100">
                <h2 class="text-xl font-semibold mb-4 text-amber-800 flex items-center gap-2">
                    📦 Produtos Disponíveis
                </h2>
                
                <div class="mb-4">
                    <input type="text" id="buscaProduto" oninput="filtrarProdutos()" placeholder="Buscar produto..." 
                        class="w-full p-2 border border-amber-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
                </div>

                <div id="listaProdutos" class="space-y-2 max-h-[400px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-amber-100">
                <h2 class="text-xl font-semibold mb-4 text-amber-800 flex items-center gap-2">
                    📝 Novo Pedido
                </h2>
                
                <form id="formPedido" onsubmit="adicionarPedido(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nome do Cliente</label>
                        <input type="text" id="cliente" required placeholder="Ex: João Silva"
                            class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Selecionar Produto</label>
                        <select id="selectProduto" onchange="calcularPrecoPrevisto()" required
                            class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
                            </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Quantidade</label>
                            <input type="number" id="quantidade" min="1" value="1" oninput="calcularPrecoPrevisto()" required
                                class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Total Estimado</label>
                            <div id="precoPrevisto" class="w-full p-2 bg-amber-100 text-amber-900 font-bold rounded-lg text-center border border-amber-200">
                                R$ 0,00
                            </div>
                        </div>
                    </div>

                    <button type="submit" 
                        class="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 shadow-md">
                        Fechar Pedido
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-amber-100 md:col-span-1">
                <h2 class="text-xl font-semibold mb-4 text-amber-800 flex items-center gap-2">
                    🛒 Pedidos Ativos
                </h2>
                
                <div id="listaPedidos" class="space-y-3 max-h-[450px] overflow-y-auto pr-1">
                    </div>

                <div class="mt-4 pt-4 border-t border-gray-200 flex justify-between items-center">
                    <span class="font-bold text-gray-700">Faturamento Total:</span>
                    <span id="totalGeral" class="text-xl font-black text-emerald-600">R$ 0,00</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Dados iniciais do sistema (Simulando um Banco de Dados)
        const produtos = [
            { id: 1, nome: "Pão Francês (kg)", preco: 14.90 },
            { id: 2, nome: "Pão de Queijo (un)", preco: 4.50 },
            { id: 3, nome: "Bolo de Fubá (un)", preco: 18.00 },
            { id: 4, nome: "Croissant de Chocolate", preco: 8.50 },
            { id: 5, nome: "Café Expresso", preco: 5.00 },
            { id: 6, nome: "Suco de Laranja 300ml", preco: 7.00 },
            { id: 7, nome: "Broa de Milho", preco: 3.80 }
        ];

        const pedidos = [];

        // Inicialização do App
        document.addEventListener("DOMContentLoaded", () => {
            renderizarProdutos(produtos);
            popularSelectProdutos();
            calcularPrecoPrevisto();
            renderizarPedidos();
        });

        // 1. Renderiza a lista de produtos na tela (Coluna 1)
        function renderizarProdutos(lista) {
            const container = document.getElementById("listaProdutos");
            container.innerHTML = "";

            if (lista.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-sm text-center py-4">Nenhum produto encontrado.</p>`;
                return;
            }

            lista.forEach(prod => {
                const item = document.createElement("div");
                item.className = "flex justify-between items-center p-2.5 bg-gray-50 rounded-lg border border-gray-100 hover:bg-amber
