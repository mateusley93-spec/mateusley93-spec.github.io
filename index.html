<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Premium - Padaria Delícia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Custom scrollbar para parecer um app nativo */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fef3c7; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen text-stone-800 flex flex-col">

    <header class="bg-gradient-to-r from-amber-700 to-amber-600 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🥐</span>
                <div>
                    <h1 class="text-xl font-black tracking-tight">Padaria Delícia</h1>
                    <p class="text-xs text-amber-200">Sistema de Gestão & PDV v2.0</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-xs text-amber-100">Operador do Caixa</p>
                    <p class="text-sm font-bold">Atendimento Interno</p>
                </div>
                <div class="bg-amber-800/50 px-3 py-1.5 rounded-xl border border-amber-500/30 text-xs font-semibold backdrop-blur-sm">
                    🟢 Online
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-7xl flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        
        <section class="lg:col-span-7 xl:col-span-8 flex flex-col gap-4">
            
            <div class="bg-white p-4 rounded-2xl shadow-xs border border-stone-200/60 space-y-3">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-stone-400">🔍</span>
                    <input type="text" id="buscaProduto" oninput="filtrarProdutos()" placeholder="Pesquise por pão, bolo, salgados, café..." 
                        class="w-full pl-10 pr-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm transition-all">
                </div>
                
                <div class="flex gap-2 overflow-x-auto pb-1" id="abasCategorias">
                    <button onclick="filtrarCategoria('Todos')" id="btn-cat-Todos" class="cat-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-amber-600 text-white shadow-xs
