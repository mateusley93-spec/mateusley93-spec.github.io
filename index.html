<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padaria Delícia</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fdf6ec;
    margin:0;
}

header{
    background:#d2691e;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
}

.produtos{
    flex:3;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

button{
    background:#d2691e;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

.carrinho{
    flex:1;
    background:white;
    padding:20px;
    border-left:2px solid #ddd;
    min-height:100vh;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
    <h1>🥖 Padaria Delícia</h1>
</header>

<div class="container">

    <div class="produtos" id="produtos"></div>

    <div class="carrinho">
        <h2>🛒 Carrinho</h2>

        <div id="listaCarrinho"></div>

        <div class="total">
            Total: R$ <span id="total">0.00</span>
        </div>
    </div>

</div>

<script>

const produtos = [

{
    id:1,
    nome:"Pão Francês",
    preco:1.00,
    imagem:"https://picsum.photos/300/200?1"
},

{
    id:2,
    nome:"Pão de Queijo",
    preco:3.50,
    imagem:"https://picsum.photos/300/200?2"
},

{
    id:3,
    nome:"Coxinha",
    preco:7.00,
    imagem:"https://picsum.photos/300/200?3"
},

{
    id:4,
    nome:"Empada",
    preco:8.00,
    imagem:"https://picsum.photos/300/200?4"
},

{
    id:5,
    nome:"Sonho",
    preco:6.00,
    imagem:"https://picsum.photos/300/200?5"
},

{
    id:6,
    nome:"Bolo Chocolate",
    preco:25.00,
    imagem:"https://picsum.photos/300/200?6"
}

];

let carrinho = [];

const produtosDiv = document.getElementById("produtos");

produtos.forEach(produto => {

    produtosDiv.innerHTML += `
        <div class="card">
            <img src="${produto.imagem}">
            <h3>${produto.nome}</h3>
            <p>R$ ${produto.preco.toFixed(2)}</p>

            <button onclick="adicionar(${produto.id})">
                Adicionar
            </button>
        </div>
    `;
});

function adicionar(id){

    const produto = produtos.find(p => p.id === id);

    const existe = carrinho.find(item => item.id === id);

    if(existe){
        existe.quantidade++;
    }else{
        carrinho.push({
            ...produto,
            quantidade:1
        });
    }

    atualizarCarrinho();
}

function atualizarCarrinho(){

    const lista = document.getElementById("listaCarrinho");

    lista.innerHTML = "";

    let total = 0;

    carrinho.forEach(item => {

        total += item.preco * item.quantidade;

        lista.innerHTML += `
            <div class="item">
                <span>
                    ${item.nome}
                    (${item.quantidade}x)
                </span>

                <span>
                    R$ ${(item.preco * item.quantidade).toFixed(2)}
                </span>
            </div>
        `;
    });

    document.getElementById("total").innerText =
        total.toFixed(2);
}

</script>

</body>
</html>
